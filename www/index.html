<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSONL Analyser</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="container">
    <div class="panel" id="data-panel">
      <div class="panel-header">
        <h2>JSONL</h2>
        <div class="file-input-container">
          <button class="btn" id="open-file">Open File</button>
          <span class="file-path" id="file-path">No file selected</span>
          <button class="btn" id="toggle-refresh">Auto Refresh<br> OFF</button>
        </div>
        <div class="row-selector">
          <button class="btn btn-small" id="first-row" title="Go to first row">&lt;&lt;</button>
          <button class="btn btn-small" id="prev-row" title="Previous row">&lt;</button>
          <span>Row:</span>
          <input type="number" id="row-input" value="0" min="0">
          <button class="btn btn-small" id="next-row" title="Next row">&gt;</button>
          <button class="btn btn-small" id="last-row" title="Go to last row">&gt;&gt;</button>
          <span id="total-rows"></span>
        </div>
      </div>
      <div class="panel-content">
        <div class="json-viewer" id="json-viewer">
          <div class="loading">Select a JSONL file to begin</div>
        </div>
      </div>
    </div>
    <div class="panel" id="chart-panel">
      <div class="panel-header">
        <h2>Line Chart</h2>
        <div class="chart-controls">
          <label>X Key:</label>
          <input type="text" class="x-key" id="x-key" value="t" placeholder="t">
          <label>Y Keys:</label>
          <input type="text" class="y-key" id="y-keys" value="state.debug.p1[1]" placeholder="state.debug.p1[1]">
          <button class="btn" id="update-chart">Update</button>
        </div>
      </div>
      <div class="panel-content">
        <div class="chart-container">
          <div id="plotly-chart"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
